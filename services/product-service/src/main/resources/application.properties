spring.application.name=product-service
server.port=8081

# Database Configuration (Environment variables with local fallbacks!)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/productdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# Hibernate & PostgreSQL settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DevOps: Expose management endpoints
management.endpoints.web.exposure.include=health,prometheus