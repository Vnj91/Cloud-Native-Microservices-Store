name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, user-service, order-service]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build Service with Maven
      run: |
        cd services/${{ matrix.service }}
        mvn clean package -DskipTests
        # Diagnostic: List target folder so we can verify the JAR name in logs
        ls -R target

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        cd services/${{ matrix.service }}
        
        # Define image name using secrets
        IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}"
        
        # Build and Push
        # The '.' context is crucial here—it represents the service directory
        docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
        docker push $IMAGE_NAME:latest
        docker push $IMAGE_NAME:${{ github.sha }}