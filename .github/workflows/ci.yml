name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [product-service, user-service, order-service]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build Service with Maven
      run: |
        cd services/${{ matrix.service }}
        # Use 'mvn' if 'mvnw' wrapper isn't present in the subdirectories
        mvn clean package -DskipTests 
        # Note: I recommend keeping -DskipTests for now until your DB-dependent 
        # tests are configured to run in a containerized CI environment.

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        cd services/${{ matrix.service }}
        IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}"
        docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
        docker push $IMAGE_NAME:latest
        docker push $IMAGE_NAME:${{ github.sha }}